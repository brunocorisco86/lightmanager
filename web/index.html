<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Manager - Painel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>💡 Light Manager</h1>
            <div id="sun-info" class="sun-card">
                Carregando dados do sol...
            </div>
            <button onclick="openConfigModal()" class="btn-config-trigger" title="Configurações">⚙️</button>
        </header>

        <!-- Modal de Configurações -->
        <div id="configModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Configurações do Sistema</h2>
                    <button onclick="loadStatus()" class="btn-refresh-mini" title="Sincronizar">🔄</button>
                    <span class="close" onclick="closeConfigModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="showTab('manage')">Gerenciar</button>
                        <button class="tab-btn" onclick="showTab('new')">Novo Ponto</button>
                        <button class="tab-btn" onclick="showTab('solar')">Histórico Solar</button>
                    </div>

                    <div id="tab-manage" class="tab-content active">
                        <h3>Pontos Cadastrados</h3>
                        <div id="config-list">Carregando...</div>
                    </div>

                    <div id="tab-new" class="tab-content">
                        <h3>Cadastrar Novo Ponto</h3>
                        <form id="new-point-form" onsubmit="createNewPoint(event)">
                            <input type="text" id="new-name" placeholder="Nome (ex: Garagem)" required>
                            <input type="text" id="new-topic" placeholder="Tópico MQTT (ex: home/outdoor/garagem)" required>
                            <input type="number" id="new-power" placeholder="Potência (Watts)" required>
                            <button type="submit" class="btn-save">Cadastrar</button>
                        </form>
                    </div>

                    <div id="tab-solar" class="tab-content">
                        <h3>Últimos Acionamentos Automáticos</h3>
                        <div class="table-container">
                            <table id="solar-history-table">
                               <thead>
                                   <tr>
                                       <th>Hora</th>
                                       <th>Local</th>
                                       <th>Ação</th>
                                   </tr>
                               </thead>
                               <tbody id="solar-history-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <section class="controls">
            <h2>Controle em Tempo Real</h2>
            <div id="light-cards" class="grid">
                <!-- Cards de luz serão inseridos aqui -->
            </div>
        </section>

        <section class="stats">
            <h2>Histórico de Uso (Últimos 7 dias)</h2>
            <canvas id="usageChart"></canvas>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
